services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sportsbetting}
      POSTGRES_USER: ${POSTGRES_USER:-sportsbetting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sportsbetting} -d ${POSTGRES_DB:-sportsbetting}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
